AWSTemplateFormatVersion: 2010-09-09

Parameters:
  ImageUri:
    Type: String

Resources:
  # ============================================================
  # IAM ROLE & PERMISSIONS
  # ============================================================
  AthenaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AthenaS3AccessRole
      AssumeRolePolicyDocument: 
        Version: "2012-10-17"
        Statement: 
          - Effect: Allow 
            Principal: 
              Service:
                - athena.amazonaws.com
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:

        - arn:aws:iam::aws:policy/AmazonAthenaFullAccess
        - arn:aws:iam::aws:policy/AWSGlueConsoleFullAccess
      Policies:
        - PolicyName: AthenaS3AccessLimited
          PolicyDocument:
            Version: "2012-10-17"
            Statement: 
              - Effect: Allow
                Action:
                  - GetObject
                  - PutObject
                  - ListBucket
                Resources: arn:aws:s3:::attempt-bucket-mlops-engine